name: End-to-end tests
# NOTE: Temporarily disabled. Re-enable by restoring `on: [push]`.
on: [workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - run: corepack enable
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'

      - name: Checkout
        uses: actions/checkout@v3

      - name: Install dependencies
        run: pnpm install

      - name: Start server
        run: pnpm dev &

      - name: Install browsers
        run: pnpm playwright install

      - name: Run tests
        run: pnpm test
